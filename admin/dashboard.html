<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Admin Dashboard - Beauty Bar Salon</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 280px;
            background: var(--dark);
            color: white;
            padding: 2rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .admin-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .admin-nav {
            list-style: none;
        }

        .admin-nav li {
            margin-bottom: 0.5rem;
        }

        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 12px 15px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .admin-nav a:hover,
        .admin-nav a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .admin-nav a i {
            width: 24px;
        }

        .admin-main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: var(--light);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eee;
        }

        .admin-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--dark);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .recent-section {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .recent-section h3 {
            margin-bottom: 1rem;
            color: var(--dark);
        }

        .recent-table {
            width: 100%;
            overflow-x: auto;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th,
        .recent-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .recent-table th {
            background: var(--secondary);
            color: var(--dark);
            font-weight: 600;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
        }

        .status-confirmed { background: #4CAF50; color: white; }
        .status-pending { background: #FFC107; color: #333; }
        .status-completed { background: #9E9E9E; color: white; }
        .status-cancelled { background: #F44336; color: white; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                width: 70px;
                padding: 1rem;
            }
            .admin-logo span,
            .admin-nav a span {
                display: none;
            }
            .admin-main {
                margin-left: 70px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-crown"></i>
                <span>Beauty Bar</span>
            </div>
            <ul class="admin-nav">
                <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a href="bookings.html"><i class="fas fa-calendar-check"></i><span>Bookings</span></a></li>
                <li><a href="services.html"><i class="fas fa-cut"></i><span>Services</span></a></li>
                <li><a href="staff.html"><i class="fas fa-users"></i><span>Staff</span></a></li>
                <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h2><i class="fas fa-chart-line"></i> Dashboard</h2>
                <div id="current-date"></div>
            </div>

            <div class="stats-grid" id="stats-container">
                <div class="stat-card">
                    <h3>Total Bookings</h3>
                    <div class="stat-value" id="total-bookings">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <div class="stat-value" id="total-revenue">₹0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Bookings</h3>
                    <div class="stat-value" id="pending-bookings">0</div>
                </div>
                <div class="stat-card">
                    <h3>Active Staff</h3>
                    <div class="stat-value" id="active-staff">0</div>
                </div>
            </div>

            <div class="recent-section">
                <h3>Recent Bookings</h3>
                <div class="recent-table" id="recent-bookings-container">
                    <div class="empty-state">Loading bookings...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data-service.js"></script>
    <script>
        // Check admin authentication
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        // Display current date
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        // Load dashboard data
        function loadDashboard() {
            if (!window.dataService) {
                setTimeout(loadDashboard, 100);
                return;
            }

            const stats = window.dataService.getStats();
            
            document.getElementById('total-bookings').textContent = stats.totalBookings;
            document.getElementById('total-revenue').textContent = `₹${stats.totalRevenue.toLocaleString()}`;
            document.getElementById('pending-bookings').textContent = stats.pendingBookings;
            document.getElementById('active-staff').textContent = stats.totalStaff;

            // Load recent bookings
            const bookings = window.dataService.getBookings();
            const recentContainer = document.getElementById('recent-bookings-container');
            
            if (bookings.length === 0) {
                recentContainer.innerHTML = '<div class="empty-state">No bookings yet</div>';
                return;
            }

            const recentBookings = bookings.slice(-5).reverse();
            
            recentContainer.innerHTML = `
                <table>
                    <thead>
                        <tr><th>ID</th><th>Customer</th><th>Service</th><th>Date</th><th>Amount</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        ${recentBookings.map(booking => {
                            const service = window.dataService.getServiceById(booking.serviceId);
                            return `
                                <tr>
                                    <td>#${booking.id}</td>
                                    <td>${booking.customerName || 'N/A'}</td>
                                    <td>${service?.name || 'N/A'}</td>
                                    <td>${booking.date || 'N/A'}</td>
                                    <td>₹${booking.amount || 0}</td>
                                    <td><span class="status-badge status-${booking.status}">${booking.status}</span></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'login.html';
        });

        // Wait for data service and load
        const checkInterval = setInterval(() => {
            if (window.dataService) {
                clearInterval(checkInterval);
                loadDashboard();
                
                // Listen for data changes
                window.dataService.subscribe(() => {
                    loadDashboard();
                });
            }
        }, 100);
    </script>
</body>
</html>
