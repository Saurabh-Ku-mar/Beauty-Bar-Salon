<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Admin Dashboard - Beauty Bar Salon</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 280px;
            background: var(--dark);
            color: white;
            padding: 2rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .admin-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .admin-nav {
            list-style: none;
        }
        
        .admin-nav li {
            margin-bottom: 0.5rem;
        }
        
        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 12px 15px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .admin-nav a:hover,
        .admin-nav a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .admin-nav a i {
            width: 24px;
        }
        
        .admin-main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: var(--light);
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eee;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .recent-section {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .recent-table {
            width: 100%;
            overflow-x: auto;
        }
        
        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .recent-table th,
        .recent-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .recent-table th {
            background: var(--secondary);
            color: var(--dark);
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-confirmed {
            background: #4CAF50;
            color: white;
        }
        
        .status-pending {
            background: #FFC107;
            color: #333;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                width: 70px;
                padding: 1rem;
            }
            
            .admin-logo span,
            .admin-nav a span {
                display: none;
            }
            
            .admin-main {
                margin-left: 70px;
            }
            
            .admin-nav a i {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-crown"></i>
                <span>Beauty Bar</span>
            </div>
            <ul class="admin-nav">
                <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a href="bookings.html"><i class="fas fa-calendar-check"></i><span>Bookings</span></a></li>
                <li><a href="services.html"><i class="fas fa-cut"></i><span>Services</span></a></li>
                <li><a href="staff.html"><i class="fas fa-users"></i><span>Staff</span></a></li>
                <li><a href="#"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
                <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </div>
        
        <div class="admin-main">
            <div class="admin-header">
                <h2>Welcome back, Admin</h2>
                <div>
                    <span id="current-date"></span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Bookings</h3>
                    <div class="stat-value" id="total-bookings">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <div class="stat-value" id="total-revenue">₹0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Bookings</h3>
                    <div class="stat-value" id="pending-bookings">0</div>
                </div>
                <div class="stat-card">
                    <h3>Active Staff</h3>
                    <div class="stat-value" id="active-staff">0</div>
                </div>
            </div>
            
            <div class="recent-section">
                <h3>Recent Bookings</h3>
                <div class="recent-table">
                    <table id="recent-table">
                        <thead>
                            <tr><th>ID</th><th>Service</th><th>Customer</th><th>Date</th><th>Amount</th><th>Status</th></tr>
                        </thead>
                        <tbody id="recent-bookings"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Check admin authentication
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        // Sample data
        const bookings = [
            { id: 1, service: "Bridal Makeup", customer: "Neha Gupta", date: "2024-12-15", amount: 4999, status: "confirmed" },
            { id: 2, service: "Hair Styling", customer: "Priya Sharma", date: "2024-12-14", amount: 1999, status: "pending" },
            { id: 3, service: "Facial Treatment", customer: "Anjali Desai", date: "2024-12-13", amount: 2499, status: "completed" }
        ];
        
        function loadDashboard() {
            const totalBookings = bookings.length;
            const totalRevenue = bookings.reduce((sum, b) => sum + b.amount, 0);
            const pendingBookings = bookings.filter(b => b.status === 'pending').length;
            
            document.getElementById('total-bookings').textContent = totalBookings;
            document.getElementById('total-revenue').textContent = `₹${totalRevenue}`;
            document.getElementById('pending-bookings').textContent = pendingBookings;
            document.getElementById('active-staff').textContent = '8';
            
            const recentTable = document.getElementById('recent-bookings');
            recentTable.innerHTML = bookings.slice(0, 5).map(booking => `
                <tr>
                    <td>#${booking.id}</td>
                    <td>${booking.service}</td>
                    <td>${booking.customer}</td>
                    <td>${booking.date}</td>
                    <td>₹${booking.amount}</td>
                    <td><span class="status-badge status-${booking.status}">${booking.status}</span></td>
                </tr>
            `).join('');
        }
        
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
        
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'login.html';
        });
        
        loadDashboard();
    </script>
</body>
</html>
