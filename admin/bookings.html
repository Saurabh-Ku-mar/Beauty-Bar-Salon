<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - Beauty Bar Salon</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 280px;
            background: var(--dark);
            color: white;
            padding: 2rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .admin-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .admin-nav {
            list-style: none;
        }
        
        .admin-nav li {
            margin-bottom: 0.5rem;
        }
        
        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 12px 15px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .admin-nav a:hover,
        .admin-nav a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .admin-main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: var(--light);
        }
        
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: white;
            padding: 1rem;
            border-radius: 10px;
        }
        
        .filter-bar select,
        .filter-bar input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .bookings-table {
            background: white;
            border-radius: 15px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: var(--secondary);
            color: var(--dark);
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
        }
        
        .status-confirmed { background: #4CAF50; color: white; }
        .status-pending { background: #FFC107; color: #333; }
        .status-completed { background: #9E9E9E; color: white; }
        .status-cancelled { background: #F44336; color: white; }
        
        .action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-approve { background: #4CAF50; color: white; }
        .btn-reject { background: #F44336; color: white; }
        .btn-view { background: #2196F3; color: white; }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                width: 70px;
                padding: 1rem;
            }
            .admin-logo span,
            .admin-nav a span {
                display: none;
            }
            .admin-main {
                margin-left: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-logo"><i class="fas fa-crown"></i><span>Beauty Bar</span></div>
            <ul class="admin-nav">
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a href="bookings.html" class="active"><i class="fas fa-calendar-check"></i><span>Bookings</span></a></li>
                <li><a href="services.html"><i class="fas fa-cut"></i><span>Services</span></a></li>
                <li><a href="staff.html"><i class="fas fa-users"></i><span>Staff</span></a></li>
                <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </div>
        
        <div class="admin-main">
            <h2>Manage Bookings</h2>
            
            <div class="filter-bar">
                <select id="status-filter">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <input type="date" id="date-filter">
                <input type="text" id="search-filter" placeholder="Search by name or service">
                <button class="btn btn-primary" onclick="exportBookings()">Export CSV</button>
            </div>
            
            <div class="bookings-table">
                <table id="bookings-table">
                    <thead>
                        <tr><th>ID</th><th>Customer</th><th>Service</th><th>Staff</th><th>Date</th><th>Time</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="bookings-list"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        let bookings = [
            { id: 1, customer: "Neha Gupta", service: "Bridal Makeup", staff: "Priya Sharma", date: "2024-12-15", time: "10:00 AM", amount: 4999, status: "confirmed" },
            { id: 2, customer: "Priya Sharma", service: "Hair Styling", staff: "Anjali Desai", date: "2024-12-14", time: "2:00 PM", amount: 1999, status: "pending" },
            { id: 3, customer: "Anjali Desai", service: "Facial Treatment", staff: "Meera Kapoor", date: "2024-12-13", time: "11:00 AM", amount: 2499, status: "completed" },
            { id: 4, customer: "Riya Mehta", service: "Nail Art", staff: "Riya Mehta", date: "2024-12-20", time: "3:00 PM", amount: 999, status: "pending" }
        ];
        
        function displayBookings() {
            const statusFilter = document.getElementById('status-filter').value;
            const dateFilter = document.getElementById('date-filter').value;
            const searchFilter = document.getElementById('search-filter').value.toLowerCase();
            
            let filtered = bookings.filter(b => {
                if (statusFilter !== 'all' && b.status !== statusFilter) return false;
                if (dateFilter && b.date !== dateFilter) return false;
                if (searchFilter && !b.customer.toLowerCase().includes(searchFilter) && !b.service.toLowerCase().includes(searchFilter)) return false;
                return true;
            });
            
            const tbody = document.getElementById('bookings-list');
            tbody.innerHTML = filtered.map(b => `
                <tr>
                    <td>#${b.id}</td>
                    <td>${b.customer}</td>
                    <td>${b.service}</td>
                    <td>${b.staff}</td>
                    <td>${b.date}</td>
                    <td>${b.time}</td>
                    <td>₹${b.amount}</td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                    <td>
                        ${b.status === 'pending' ? `<button class="action-btn btn-approve" onclick="updateStatus(${b.id}, 'confirmed')">Approve</button>
                        <button class="action-btn btn-reject" onclick="updateStatus(${b.id}, 'cancelled')">Reject</button>` : ''}
                        <button class="action-btn btn-view" onclick="viewBooking(${b.id})">View</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function updateStatus(id, newStatus) {
            const booking = bookings.find(b => b.id === id);
            if (booking) {
                booking.status = newStatus;
                displayBookings();
                alert(`Booking #${id} ${newStatus === 'confirmed' ? 'approved' : 'rejected'} successfully!`);
            }
        }
        
        function viewBooking(id) {
            const booking = bookings.find(b => b.id === id);
            alert(`Booking Details:\nCustomer: ${booking.customer}\nService: ${booking.service}\nStaff: ${booking.staff}\nDate: ${booking.date}\nTime: ${booking.time}\nAmount: ₹${booking.amount}\nStatus: ${booking.status}`);
        }
        
        function exportBookings() {
            let csv = "ID,Customer,Service,Staff,Date,Time,Amount,Status\n";
            bookings.forEach(b => {
                csv += `${b.id},${b.customer},${b.service},${b.staff},${b.date},${b.time},${b.amount},${b.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bookings.csv';
            a.click();
        }
        
        document.getElementById('status-filter').addEventListener('change', displayBookings);
        document.getElementById('date-filter').addEventListener('change', displayBookings);
        document.getElementById('search-filter').addEventListener('input', displayBookings);
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        });
        
        displayBookings();
    </script>
</body>
</html>
