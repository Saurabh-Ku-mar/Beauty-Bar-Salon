<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>Manage Services - Beauty Bar Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #FAF9F6; }
        .admin-container { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 280px; background: #1C1C1C; color: white; padding: 2rem; position: fixed; height: 100vh; overflow-y: auto; }
        .admin-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 2rem; text-align: center; }
        .admin-nav { list-style: none; }
        .admin-nav li { margin-bottom: 0.5rem; }
        .admin-nav a { display: flex; align-items: center; gap: 1rem; padding: 12px 15px; color: #ccc; text-decoration: none; border-radius: 10px; transition: all 0.3s; }
        .admin-nav a:hover, .admin-nav a.active { background: rgba(255,255,255,0.1); color: white; }
        .admin-main { flex: 1; margin-left: 280px; padding: 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .btn-add { background: linear-gradient(135deg, #B76E79, #F8D7DA); color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .service-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .service-card img { width: 100%; height: 180px; object-fit: cover; }
        .service-info { padding: 1rem; }
        .service-info h3 { margin-bottom: 0.5rem; }
        .service-price { color: #B76E79; font-size: 1.2rem; font-weight: bold; }
        .service-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .btn-edit { background: #2196F3; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; }
        .btn-delete { background: #F44336; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .modal-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .btn-save { background: #B76E79; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
        .btn-cancel { background: #ddd; color: #666; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 12px 20px; border-radius: 8px; z-index: 2000; animation: slideIn 0.3s; }
        .toast.error { background: #f44336; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .admin-sidebar { width: 70px; padding: 1rem; } .admin-main { margin-left: 70px; } .admin-logo span, .admin-nav a span { display: none; } .services-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-logo"><i class="fas fa-crown"></i><span>Beauty Bar</span></div>
            <ul class="admin-nav">
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a href="bookings.html"><i class="fas fa-calendar-check"></i><span>Bookings</span></a></li>
                <li><a href="services.html" class="active"><i class="fas fa-cut"></i><span>Services</span></a></li>
                <li><a href="staff.html"><i class="fas fa-users"></i><span>Staff</span></a></li>
                <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </div>
        <div class="admin-main">
            <div class="page-header">
                <h2>Manage Services</h2>
                <button class="btn-add" onclick="openAddModal()">+ Add New Service</button>
            </div>
            <div id="services-container" class="services-grid">
                <div style="text-align: center; padding: 2rem;">Loading services...</div>
            </div>
        </div>
    </div>

    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Service</h3>
            <form id="serviceForm">
                <input type="hidden" id="serviceId">
                <div class="form-group"><label>Service Name *</label><input type="text" id="serviceName" class="form-control" required></div>
                <div class="form-group"><label>Category *</label><select id="serviceCategory" class="form-control" required><option>Bridal</option><option>Hair</option><option>Makeup</option><option>Nails</option><option>Skincare</option></select></div>
                <div class="form-group"><label>Price (₹) *</label><input type="number" id="servicePrice" class="form-control" required></div>
                <div class="form-group"><label>Duration (minutes) *</label><input type="number" id="serviceDuration" class="form-control" required></div>
                <div class="form-group"><label>Description</label><textarea id="serviceDescription" class="form-control" rows="3"></textarea></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="serviceImage" class="form-control" placeholder="https://..."></div>
                <div class="modal-buttons"><button type="submit" class="btn-save">Save Service</button><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button></div>
            </form>
        </div>
    </div>

    <script src="../js/data-service.js"></script>
    <script>
        if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        let services = [];

        function loadServices() {
            const container = document.getElementById('services-container');
            if (!window.dataService) { setTimeout(loadServices, 100); return; }
            
            services = window.dataService.getAllServices();
            
            if (services.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem;"><p>No services yet. Click "Add New Service" to get started.</p></div>';
                return;
            }
            
            container.innerHTML = services.map(service => `
                <div class="service-card">
                    <img src="${service.image || 'https://placehold.co/400x300/B76E79/white?text=' + service.name}" alt="${service.name}" onerror="this.src='https://placehold.co/400x300/B76E79/white?text=${service.name}'">
                    <div class="service-info">
                        <h3>${service.name}</h3>
                        <p>${service.category} • ${service.duration} mins</p>
                        <div class="service-price">₹${service.price}</div>
                        <p style="font-size:0.8rem; color:#666;">${service.description || ''}</p>
                        <div class="service-actions">
                            <button class="btn-edit" onclick="editService(${service.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteService(${service.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Service';
            document.getElementById('serviceForm').reset();
            document.getElementById('serviceId').value = '';
            document.getElementById('serviceModal').classList.add('active');
        }

        function editService(id) {
            const service = services.find(s => s.id === id);
            if (service) {
                document.getElementById('modalTitle').textContent = 'Edit Service';
                document.getElementById('serviceId').value = service.id;
                document.getElementById('serviceName').value = service.name;
                document.getElementById('serviceCategory').value = service.category;
                document.getElementById('servicePrice').value = service.price;
                document.getElementById('serviceDuration').value = service.duration;
                document.getElementById('serviceDescription').value = service.description || '';
                document.getElementById('serviceImage').value = service.image || '';
                document.getElementById('serviceModal').classList.add('active');
            }
        }

        function deleteService(id) {
            if (confirm('Delete this service?')) {
                window.dataService.deleteService(id);
                loadServices();
                showToast('Service deleted!', 'success');
                setTimeout(() => window.location.reload(), 500);
            }
        }

        function closeModal() { document.getElementById('serviceModal').classList.remove('active'); }

        document.getElementById('serviceForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('serviceId').value;
            const serviceData = {
                name: document.getElementById('serviceName').value,
                category: document.getElementById('serviceCategory').value,
                price: parseInt(document.getElementById('servicePrice').value),
                duration: parseInt(document.getElementById('serviceDuration').value),
                description: document.getElementById('serviceDescription').value,
                image: document.getElementById('serviceImage').value
            };
            
            if (id) window.dataService.updateService(id, serviceData);
            else window.dataService.addService(serviceData);
            
            closeModal();
            loadServices();
            showToast(id ? 'Service updated!' : 'Service added!', 'success');
            setTimeout(() => window.location.reload(), 500);
        });

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        });

        loadServices();
        if (window.dataService) window.dataService.subscribe(() => loadServices());
    </script>
</body>
</html>
