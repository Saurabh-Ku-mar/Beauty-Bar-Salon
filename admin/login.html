<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Beauty Bar Salon</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #B76E79, #F8D7DA); padding: 2rem; }
        .login-card { background: white; border-radius: 20px; padding: 3rem; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .login-logo { margin-bottom: 2rem; }
        .login-logo h1 { color: var(--primary); font-family: 'Playfair Display', serif; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .login-btn { width: 100%; padding: 12px; background: var(--gradient); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .error-message { background: #fee; color: #c00; padding: 10px; border-radius: 8px; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-crown" style="font-size: 3rem; color: var(--primary);"></i><h1>Beauty Bar Admin</h1><p>Sign in to manage your salon</p></div>
            <div class="error-message" id="error-message">Invalid credentials</div>
            <form id="login-form">
                <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control" placeholder="admin@beautybarsalon.com" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" class="form-control" placeholder="Enter password" required></div>
                <button type="submit" class="login-btn">Login to Dashboard</button>
            </form>
            <p style="margin-top: 1rem;"><a href="../index.html" style="color: var(--primary);">← Back to Website</a></p>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            // Demo credentials
            if (email === 'admin@beautybarsalon.com' && password === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-message').style.display = 'block';
                setTimeout(() => document.getElementById('error-message').style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
