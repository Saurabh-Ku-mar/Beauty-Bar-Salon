<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff - Beauty Bar Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #FAF9F6; }
        .admin-container { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 280px; background: #1C1C1C; color: white; padding: 2rem; position: fixed; height: 100vh; overflow-y: auto; }
        .admin-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 2rem; text-align: center; }
        .admin-nav { list-style: none; }
        .admin-nav li { margin-bottom: 0.5rem; }
        .admin-nav a { display: flex; align-items: center; gap: 1rem; padding: 12px 15px; color: #ccc; text-decoration: none; border-radius: 10px; transition: all 0.3s; }
        .admin-nav a:hover, .admin-nav a.active { background: rgba(255,255,255,0.1); color: white; }
        .admin-main { flex: 1; margin-left: 280px; padding: 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .btn-add { background: linear-gradient(135deg, #B76E79, #F8D7DA); color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .staff-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s; text-align: center; }
        .staff-card:hover { transform: translateY(-5px); }
        .staff-card img { width: 100%; height: 250px; object-fit: cover; }
        .staff-info { padding: 1rem; }
        .staff-info h3 { margin-bottom: 0.3rem; }
        .staff-position { color: #B76E79; font-weight: 500; }
        .staff-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .btn-edit { background: #2196F3; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; }
        .btn-delete { background: #F44336; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .modal-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .btn-save { background: #B76E79; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
        .btn-cancel { background: #ddd; color: #666; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 12px 20px; border-radius: 8px; z-index: 2000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .admin-sidebar { width: 70px; padding: 1rem; } .admin-main { margin-left: 70px; } .admin-logo span, .admin-nav a span { display: none; } .staff-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-logo"><i class="fas fa-crown"></i><span>Beauty Bar</span></div>
            <ul class="admin-nav">
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a href="bookings.html"><i class="fas fa-calendar-check"></i><span>Bookings</span></a></li>
                <li><a href="services.html"><i class="fas fa-cut"></i><span>Services</span></a></li>
                <li><a href="staff.html" class="active"><i class="fas fa-users"></i><span>Staff</span></a></li>
                <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </div>
        <div class="admin-main">
            <div class="page-header">
                <h2>Manage Staff</h2>
                <button class="btn-add" onclick="openAddModal()">+ Add New Staff</button>
            </div>
            <div id="staff-container" class="staff-grid">
                <div style="text-align: center; padding: 2rem;">Loading staff...</div>
            </div>
        </div>
    </div>

    <div id="staffModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Staff</h3>
            <form id="staffForm">
                <input type="hidden" id="staffId">
                <div class="form-group"><label>Full Name *</label><input type="text" id="staffName" class="form-control" required></div>
                <div class="form-group"><label>Position *</label><input type="text" id="staffPosition" class="form-control" required></div>
                <div class="form-group"><label>Specialty *</label><input type="text" id="staffSpecialty" class="form-control" required></div>
                <div class="form-group"><label>Experience *</label><input type="text" id="staffExperience" class="form-control" placeholder="8+ years" required></div>
                <div class="form-group"><label>Rating (1-5)</label><input type="number" id="staffRating" class="form-control" step="0.1" min="0" max="5" value="4.8"></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="staffImage" class="form-control" placeholder="https://..."></div>
                <div class="modal-buttons"><button type="submit" class="btn-save">Save Staff</button><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button></div>
            </form>
        </div>
    </div>

    <script src="../js/data-service.js"></script>
    <script>
        if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        let staff = [];

        function loadStaff() {
            const container = document.getElementById('staff-container');
            if (!window.dataService) { setTimeout(loadStaff, 100); return; }
            
            staff = window.dataService.getAllStaff();
            
            if (staff.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem;"><p>No staff yet. Click "Add New Staff" to get started.</p></div>';
                return;
            }
            
            container.innerHTML = staff.map(member => `
                <div class="staff-card">
                    <img src="${member.image || 'https://placehold.co/300x300/B76E79/white?text=' + member.name}" alt="${member.name}" onerror="this.src='https://placehold.co/300x300/B76E79/white?text=${member.name}'">
                    <div class="staff-info">
                        <h3>${member.name}</h3>
                        <div class="staff-position">${member.position}</div>
                        <p>${member.specialty}</p>
                        <p>⭐ ${member.rating} (${member.reviews}+ reviews)</p>
                        <p>${member.experience} experience</p>
                        <div class="staff-actions">
                            <button class="btn-edit" onclick="editStaff(${member.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteStaff(${member.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Staff';
            document.getElementById('staffForm').reset();
            document.getElementById('staffId').value = '';
            document.getElementById('staffRating').value = '4.8';
            document.getElementById('staffModal').classList.add('active');
        }

        function editStaff(id) {
            const member = staff.find(s => s.id === id);
            if (member) {
                document.getElementById('modalTitle').textContent = 'Edit Staff';
                document.getElementById('staffId').value = member.id;
                document.getElementById('staffName').value = member.name;
                document.getElementById('staffPosition').value = member.position;
                document.getElementById('staffSpecialty').value = member.specialty;
                document.getElementById('staffExperience').value = member.experience;
                document.getElementById('staffRating').value = member.rating || 4.8;
                document.getElementById('staffImage').value = member.image || '';
                document.getElementById('staffModal').classList.add('active');
            }
        }

        function deleteStaff(id) {
            if (confirm('Delete this staff member?')) {
                window.dataService.deleteStaff(id);
                loadStaff();
                showToast('Staff deleted!');
                setTimeout(() => window.location.reload(), 500);
            }
        }

        function closeModal() { document.getElementById('staffModal').classList.remove('active'); }

        document.getElementById('staffForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('staffId').value;
            const staffData = {
                name: document.getElementById('staffName').value,
                position: document.getElementById('staffPosition').value,
                specialty: document.getElementById('staffSpecialty').value,
                experience: document.getElementById('staffExperience').value,
                rating: parseFloat(document.getElementById('staffRating').value),
                image: document.getElementById('staffImage').value,
                reviews: 100,
                services: []
            };
            
            if (id) window.dataService.updateStaff(id, staffData);
            else window.dataService.addStaff(staffData);
            
            closeModal();
            loadStaff();
            showToast(id ? 'Staff updated!' : 'Staff added!');
            setTimeout(() => window.location.reload(), 500);
        });

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        });

        loadStaff();
        if (window.dataService) window.dataService.subscribe(() => loadStaff());
    </script>
</body>
</html>
